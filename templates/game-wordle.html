<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Wordle — Jarvis</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #c8d8e8; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
.header { width: 100%; background: #0d1a2a; border-bottom: 1px solid #1a2e4a; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
.header a { color: #4a9eff; text-decoration: none; font-size: 0.85rem; }
.header h1 { color: #4a9eff; font-size: 1rem; letter-spacing: 2px; flex: 1; }
#msg-bar { min-height: 28px; text-align: center; font-size: 0.85rem; color: #ff6b4a; padding: 6px 0 2px; font-weight: 600; }
#grid { display: flex; flex-direction: column; gap: 6px; padding: 8px 0; }
.row { display: flex; gap: 6px; }
.tile {
    width: 56px; height: 56px;
    border: 2px solid #1a2e4a;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; font-weight: 800; text-transform: uppercase;
    transition: background 0.2s, border-color 0.2s;
}
.tile.active { border-color: #4a9eff; }
.tile.correct { background: #2a6a3a; border-color: #2a6a3a; color: #fff; }
.tile.present { background: #7a5a10; border-color: #7a5a10; color: #fff; }
.tile.absent  { background: #1a2535; border-color: #1a2535; color: #556; }
#keyboard { display: flex; flex-direction: column; gap: 6px; padding: 12px 0; align-items: center; }
.kb-row { display: flex; gap: 4px; }
.key {
    background: #0d1a2a; border: 1px solid #1a2e4a;
    color: #c8d8e8; border-radius: 6px;
    width: 32px; height: 46px;
    font-size: 0.8rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; text-transform: uppercase;
    transition: background 0.15s;
}
.key.wide { width: 46px; font-size: 0.7rem; }
.key:active { filter: brightness(1.3); }
.key.correct { background: #2a6a3a; border-color: #2a6a3a; }
.key.present { background: #7a5a10; border-color: #7a5a10; }
.key.absent  { background: #111820; border-color: #111820; color: #334; }
#overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(13,17,23,0.97); border: 1px solid #4a9eff; border-radius: 12px; padding: 24px 32px; text-align: center; z-index: 10; min-width: 220px; }
#overlay h2 { color: #4a9eff; margin-bottom: 8px; }
#overlay p { color: #8ab4d4; margin-bottom: 16px; font-size: 0.9rem; }
#overlay .word { font-size: 1.4rem; font-weight: 800; color: #fff; letter-spacing: 4px; margin: 8px 0; }
#overlay button { background: #4a9eff; color: #0d1117; border: none; padding: 10px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<div class="header"><a href="/games">← Games</a><h1>WORDLE</h1></div>
<div id="msg-bar"></div>
<div id="grid"></div>
<div id="keyboard"></div>
<div id="overlay" style="display:none">
    <h2 id="ol-title"></h2>
    <div class="word" id="ol-word"></div>
    <p id="ol-sub"></p>
    <button onclick="newGame()">PLAY AGAIN</button>
</div>

const KB = [
    ['q','w','e','r','t','y','u','i','o','p'],
    ['a','s','d','f','g','h','j','k','l'],
    ['ENTER','z','x','c','v','b','n','m','⌫']
];

let word, guess, guesses, gameState; // 'playing','won','lost'
let keyState = {};

function newGame() {
    document.getElementById('overlay').style.display='none';
    word = WORDS[Math.floor(Math.random()*WORDS.length)].toUpperCase();
    guess = '';
    guesses = [];
    gameState = 'playing';
    keyState = {};
    buildGrid();
    buildKeyboard();
    setMsg('');
}

function buildGrid() {
    const g = document.getElementById('grid');
    g.innerHTML = '';
    for(let r=0;r<6;r++){
        const row = document.createElement('div');
        row.className='row';
        for(let c=0;c<5;c++){
            const t=document.createElement('div');
            t.className='tile'; t.id=`t-${r}-${c}`;
            row.appendChild(t);
        }
        g.appendChild(row);
    }
}

function buildKeyboard() {
    const k = document.getElementById('keyboard');
    k.innerHTML='';
    KB.forEach(row=>{
        const r=document.createElement('div'); r.className='kb-row';
        row.forEach(key=>{
            const b=document.createElement('div');
            b.className='key'+(key.length>1?' wide':'');
            b.textContent=key; b.id='k-'+key;
            b.addEventListener('click',()=>handleKey(key));
            r.appendChild(b);
        });
        k.appendChild(r);
    });
}

function setMsg(m){document.getElementById('msg-bar').textContent=m;}

function handleKey(k) {
    if(gameState!=='playing') return;
    if(k==='⌫'||k==='BACKSPACE'||k==='Backspace'){
        guess=guess.slice(0,-1);
    } else if(k==='ENTER'||k==='Enter'){
        submitGuess();
        return;
    } else if(/^[A-Za-z]$/.test(k) && guess.length<5){
        guess+=k.toUpperCase();
    }
    updateCurrentRow();
}

function updateCurrentRow() {
    const row = guesses.length;
    for(let c=0;c<5;c++){
        const t=document.getElementById(`t-${row}-${c}`);
        t.textContent = guess[c]||'';
        t.className='tile'+(c<guess.length?' active':'');
    }
}

function submitGuess() {
    if(guess.length<5){setMsg('Not enough letters');return;}
    if(!WORDS.includes(guess.toLowerCase())&&!WORDS.includes(guess)){
        // Allow any 5-letter attempt (no hard dictionary check)
    }
    const result = score(guess);
    const row = guesses.length;
    guesses.push(guess);

    // Update tiles
    result.forEach((s,c)=>{
        setTimeout(()=>{
            const t=document.getElementById(`t-${row}-${c}`);
            t.className='tile '+s;
            t.textContent=guess[c];
        }, c*80);
    });

    // Update keyboard
    setTimeout(()=>{
        result.forEach((s,c)=>{
            const letter=guess[c];
            const cur=keyState[letter];
            if(s==='correct'||(s==='present'&&cur!=='correct')||(s==='absent'&&!cur)){
                keyState[letter]=s;
            }
            const kb=document.getElementById('k-'+letter.toLowerCase());
            if(kb) kb.className='key '+keyState[letter];
        });
        if(result.every(s=>s==='correct')){
            gameState='won';
            const n=guesses.length;
            setTimeout(()=>showOver(true,n),300);
        } else if(guesses.length===6){
            gameState='lost';
            setTimeout(()=>showOver(false,0),300);
        } else {
            guess='';
            setMsg('');
        }
    },5*80+100);
}

function score(g) {
    const res=Array(5).fill('absent');
    const wArr=[...word], gArr=[...g];
    // Correct pass
    for(let i=0;i<5;i++){
        if(gArr[i]===wArr[i]){res[i]='correct';wArr[i]=null;gArr[i]=null;}
    }
    // Present pass
    for(let i=0;i<5;i++){
        if(!gArr[i]) continue;
        const wi=wArr.indexOf(gArr[i]);
        if(wi!==-1){res[i]='present';wArr[wi]=null;}
    }
    return res;
}

function showOver(won, guessCount) {
    const ol=document.getElementById('overlay');
    document.getElementById('ol-title').textContent=won?`You got it! 🎉`:'Game Over';
    document.getElementById('ol-word').textContent=word;
    document.getElementById('ol-sub').textContent=won?`In ${guessCount} guess${guessCount===1?'':'es'}`:`Better luck next time`;
    ol.style.display='block';
}

document.addEventListener('keydown',e=>{
    if(e.ctrlKey||e.metaKey) return;
    handleKey(e.key);
});

newGame();
</script>
