<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Jarvis — Games</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: #0d1117; color: #c8d8e8;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
}
.header {
    background: #0d1a2a;
    border-bottom: 1px solid #1a2e4a;
    padding: 14px 20px;
    display: flex; align-items: center; gap: 12px;
}
.header a { color: #4a9eff; text-decoration: none; font-size: 0.85rem; }
.header h1 { color: #4a9eff; font-size: 1.1rem; flex: 1; letter-spacing: 2px; }
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 16px;
    padding: 24px 20px;
    max-width: 700px;
    margin: 0 auto;
}
.card {
    background: #0d1a2a;
    border: 1px solid #1a2e4a;
    border-radius: 12px;
    padding: 24px 16px;
    text-align: center;
    text-decoration: none;
    color: #c8d8e8;
    transition: border-color 0.2s, transform 0.1s;
    cursor: pointer;
    display: block;
}
.card:active { transform: scale(0.96); }
.card:hover { border-color: #4a9eff; }
.card .icon { font-size: 2.5rem; margin-bottom: 10px; }
.card .name { font-size: 0.95rem; font-weight: 600; color: #8ab4d4; }
.card .desc { font-size: 0.75rem; color: #445; margin-top: 4px; }
.section-title {
    color: #4a9eff;
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 20px 20px 8px;
    max-width: 700px;
    margin: 0 auto;
}
</style>
</head>
<body>

<div class="header">
    <a href="/">← Back to Jarvis</a>
    <h1>GAMES</h1>
</div>

<div class="section-title">Arcade</div>
<div class="grid">
    <a class="card" href="/game/snake">
        <div class="icon">🐍</div>
        <div class="name">Snake</div>
        <div class="desc">Classic snake — eat, grow, survive</div>
    </a>
    <a class="card" href="/game/tetris">
        <div class="icon">🟦</div>
        <div class="name">Tetris</div>
        <div class="desc">Stack blocks, clear lines</div>
    </a>
    <a class="card" href="/game/pong">
        <div class="icon">🏓</div>
        <div class="name">Pong</div>
        <div class="desc">Classic paddle vs AI</div>
    </a>
    <a class="card" href="/game/breakout">
        <div class="icon">🧱</div>
        <div class="name">Breakout</div>
        <div class="desc">Smash the bricks</div>
    </a>
</div>

<div class="section-title">Puzzle</div>
<div class="grid">
    <a class="card" href="/game/2048">
        <div class="icon">🔢</div>
        <div class="name">2048</div>
        <div class="desc">Merge tiles to reach 2048</div>
    </a>
    <a class="card" href="/game/minesweeper">
        <div class="icon">💣</div>
        <div class="name">Minesweeper</div>
        <div class="desc">Find the mines</div>
    </a>
    <a class="card" href="/game/wordle">
        <div class="icon">🔤</div>
        <div class="name">Wordle</div>
        <div class="desc">Guess the 5-letter word</div>
    </a>
    <a class="card" href="/game/chess">
        <div class="icon">♟️</div>
        <div class="name">Chess</div>
        <div class="desc">Play against the AI</div>
    </a>
</div>

</body>
</html>
